<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI ラジオ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Share+Tech+Mono&display=swap');
  :root {
    --bg: #0a0a0f; --surface: #13131a; --border: #2a2a3a;
    --accent: #ff4d6d; --accent2: #7b61ff; --text: #e8e8f0; --muted: #666680;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; padding: 24px 16px;
  }
  .header { text-align: center; margin-bottom: 28px; }
  .station-label {
    font-family: 'Share Tech Mono', monospace; font-size: 11px;
    letter-spacing: 4px; color: var(--accent); text-transform: uppercase; margin-bottom: 8px;
  }
  h1 { font-size: clamp(32px, 8vw, 52px); font-weight: 900; letter-spacing: -1px; }
  h1 span { color: var(--accent); }
  .tagline { color: var(--muted); font-size: 13px; margin-top: 6px; }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 24px 20px;
    width: 100%; max-width: 480px; margin-bottom: 16px;
  }
  .section-label {
    font-family: 'Share Tech Mono', monospace; font-size: 10px;
    letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px;
  }
  input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text); font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 14px; padding: 12px 14px; outline: none; transition: border-color 0.2s; -webkit-appearance: none;
  }
  input:focus { border-color: var(--accent2); }
  input[type="password"] { font-family: 'Share Tech Mono', monospace; letter-spacing: 2px; }
  .key-saved {
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(123,97,255,0.1); border: 1px solid rgba(123,97,255,0.3);
    border-radius: 10px; padding: 10px 14px; font-size: 13px; color: var(--accent2);
  }
  .key-saved button {
    background: transparent; border: none; color: var(--muted);
    cursor: pointer; font-size: 12px; text-decoration: underline;
  }
  .divider { border: none; border-top: 1px solid var(--border); margin: 18px 0; }
  .btn-main {
    width: 100%; border: none; border-radius: 14px; color: white; cursor: pointer;
    font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 18px; font-weight: 900;
    padding: 20px; letter-spacing: 2px; transition: all 0.2s; background: var(--accent);
  }
  .btn-main:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(255,77,109,0.5); }
  .btn-main:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-stop {
    width: 100%; background: transparent; border: 1px solid var(--border);
    border-radius: 14px; color: var(--muted); cursor: pointer;
    font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 15px; font-weight: 700;
    padding: 14px; margin-top: 10px; transition: all 0.2s;
  }
  .btn-stop:hover { border-color: var(--accent); color: var(--accent); }
  .now-playing {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 24px 20px;
    width: 100%; max-width: 480px; margin-bottom: 16px; display: none;
  }
  .now-playing.visible { display: block; }
  .waveform { display: flex; align-items: center; gap: 3px; height: 32px; margin-bottom: 16px; }
  .bar { width: 3px; border-radius: 2px; animation: wave 1s ease-in-out infinite; opacity: 0.3; }
  .bar.talk { background: var(--accent); }
  .bar.cm { background: #ffd700; }
  .bar.active { opacity: 1; }
  @keyframes wave { 0%,100%{height:4px} 50%{height:24px} }
  .bar:nth-child(1){animation-delay:0s}.bar:nth-child(2){animation-delay:.1s}
  .bar:nth-child(3){animation-delay:.2s}.bar:nth-child(4){animation-delay:.3s}
  .bar:nth-child(5){animation-delay:.4s}.bar:nth-child(6){animation-delay:.3s}
  .bar:nth-child(7){animation-delay:.2s}.bar:nth-child(8){animation-delay:.1s}
  .bar:nth-child(9){animation-delay:0s}
  .mode-badge {
    display: inline-block; border-radius: 20px; font-size: 12px; font-weight: 700;
    padding: 4px 12px; margin-bottom: 12px; letter-spacing: 1px;
  }
  .mode-talk { background: rgba(255,77,109,0.2); color: var(--accent); }
  .mode-cm { background: rgba(255,215,0,0.2); color: #ffd700; }
  .mode-loading { background: rgba(123,97,255,0.2); color: var(--accent2); }
  .current-theme { font-size: 15px; font-weight: 700; margin-bottom: 16px; color: var(--text); }
  .chat-log {
    display: flex; flex-direction: column; gap: 10px;
    margin-bottom: 16px; max-height: 350px; overflow-y: auto;
  }
  .chat-bubble { display: flex; gap: 10px; align-items: flex-start; }
  .chat-bubble.right { flex-direction: row-reverse; }
  .bubble-avatar { font-size: 22px; flex-shrink: 0; width: 32px; text-align: center; }
  .bubble-content { max-width: 82%; }
  .bubble-name { font-size: 11px; font-weight: 700; margin-bottom: 3px; }
  .chat-bubble.left .bubble-name { color: var(--accent); }
  .chat-bubble.right .bubble-name { color: var(--accent2); text-align: right; }
  .bubble-text {
    background: var(--bg); border-radius: 12px; font-size: 14px;
    line-height: 1.7; padding: 10px 13px; border: 1px solid var(--border);
  }
  .chat-bubble.left .bubble-text { border-color: rgba(255,77,109,0.3); border-top-left-radius: 3px; }
  .chat-bubble.right .bubble-text { border-color: rgba(123,97,255,0.3); border-top-right-radius: 3px; }
  .bubble-text.speaking { background: rgba(255,255,255,0.06); }
  .cm-box {
    background: rgba(255,215,0,0.07); border: 1px solid rgba(255,215,0,0.3);
    border-radius: 12px; padding: 14px; font-size: 14px; line-height: 1.7;
    margin-bottom: 16px; display: none; color: #ffe566;
  }
  .cm-box.visible { display: block; }
  .bgm-indicator {
    display: flex; align-items: center; gap: 8px;
    font-family: 'Share Tech Mono', monospace; font-size: 11px;
    color: var(--muted); margin-top: 12px;
  }
  .bgm-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--accent2);
    animation: pulse 1.5s ease-in-out infinite;
  }
  .bgm-dot.off { background: var(--muted); animation: none; opacity: 0.3; }
  @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }
  .status {
    font-family: 'Share Tech Mono', monospace; font-size: 11px;
    color: var(--muted); text-align: center; margin-top: 10px; min-height: 16px;
  }
  .status.error { color: var(--accent); }
</style>
</head>
<body>

<div class="header">
  <div class="station-label">📻 on air</div>
  <h1>AI<span>Radio</span></h1>
  <div class="tagline">エンドレスラジオ — 止まるまで流れ続ける</div>
</div>

<div class="card" id="setupCard">
  <div id="apiKeyGroup">
    <div class="section-label">🔑 API キー</div>
    <div id="keySavedBanner" class="key-saved" style="display:none">
      <span>✅ APIキー保存済み</span>
      <button onclick="clearKey()">削除して再入力</button>
    </div>
    <div id="keyInputArea">
      <input type="password" id="apiKey" placeholder="sk-ant-api..." autocomplete="off">
      <div style="margin-top:8px;display:flex;gap:8px;align-items:center;">
        <input type="checkbox" id="saveKey" checked style="width:auto;padding:0;accent-color:var(--accent2)">
        <label for="saveKey" style="font-size:12px;color:var(--muted);cursor:pointer">このデバイスに保存する</label>
      </div>
    </div>
  </div>
  <hr class="divider">
  <button class="btn-main" id="startBtn" onclick="startRadio()">▶ 放送開始</button>
  <div class="status" id="status"></div>
</div>

<div class="now-playing" id="nowPlaying">
  <div class="section-label">📡 オンエア中</div>
  <div class="waveform">
    <div class="bar talk" id="b1"></div><div class="bar talk" id="b2"></div>
    <div class="bar talk" id="b3"></div><div class="bar talk" id="b4"></div>
    <div class="bar talk" id="b5"></div><div class="bar talk" id="b6"></div>
    <div class="bar talk" id="b7"></div><div class="bar talk" id="b8"></div>
    <div class="bar talk" id="b9"></div>
  </div>
  <div class="mode-badge mode-loading" id="modeBadge">⏳ 準備中</div>
  <div class="current-theme" id="currentTheme"></div>
  <div class="chat-log" id="chatLog"></div>
  <div class="cm-box" id="cmBox"></div>
  <div class="bgm-indicator">
    <div class="bgm-dot" id="bgmDot"></div>
    <span id="bgmLabel">BGM 再生中</span>
  </div>
  <button class="btn-stop" onclick="stopRadio()">■ 放送終了</button>
</div>

<script>
// ===== 定数 =====
const DJS = {
  a: { name: 'ハル',   emoji: '😄', pitch: 1.2,  rate: 1.0,  desc: '明るくテンション高め。話を広げるのが得意。' },
  b: { name: 'ソラ',   emoji: '🤓', pitch: 0.85, rate: 0.95, desc: '冷静で知識豊富。ツッコミ担当。' },
  c: { name: 'ナナ',   emoji: '😎', pitch: 1.3,  rate: 1.1,  desc: 'トレンド大好きギャル系。話が脱線しがち。テンションが読めない。' },
  d: { name: 'ジョージ', emoji: '🧓', pitch: 0.75, rate: 0.88, desc: '昭和のおじさんDJ。古いたとえ話が多く若者文化についていけないが人情味がある。' }
};

// ランダムで2人選ぶ
function pickDJs() {
  const keys = Object.keys(DJS);
  const shuffled = keys.sort(() => Math.random() - 0.5);
  return [shuffled[0], shuffled[1]];
}

// テーマはAIが生成
async function fetchTheme() {
  const useNews = Math.random() < 0.3; // 30%の確率でニュース系
  const prompt = useNews
    ? `あなたはラジオ番組のプロデューサーです。最近の日本や世界のニュース・トレンドを踏まえて、ラジオトークのテーマを1つ考えてください。テーマの文章のみ出力してください（例：最近話題の○○について）。説明不要。`
    : `あなたはラジオ番組のプロデューサーです。リスナーが楽しめる面白いラジオトークのテーマを1つ考えてください。日常・文化・雑学・人生・トレンドなど何でもOK。テーマの文章のみ出力してください（例：○○について）。説明不要。毎回違うテーマにしてください。`;
  return await callAPI(prompt, 100);
}

const BGM_PATTERNS = [
  { notes: [261.6,311.1,369.9,415.3], type: 'sine', interval: 1.0, vol: 0.03 },
  { notes: [329.6,392.0,440.0,523.2], type: 'triangle', interval: 0.7, vol: 0.025 },
  { notes: [220.0,246.9,277.2,329.6], type: 'sine', interval: 1.3, vol: 0.035 },
  { notes: [349.2,392.0,440.0,493.8], type: 'triangle', interval: 0.6, vol: 0.025 },
  { notes: [196.0,220.0,261.6,293.6], type: 'sine', interval: 1.1, vol: 0.03 }
];

// ===== 状態 =====
let isRunning = false;
let synth = window.speechSynthesis;
let voices = [];
let audioCtx = null;
let bgmNodes = [];
let bgmLoopTimer = null;
let bgmOn = false;
let lastBgmIdx = -1;

// ===== 音声 =====
function loadVoices() {
  voices = synth.getVoices().filter(v => v.lang.startsWith('ja'));
}
loadVoices();
if (speechSynthesis.onvoiceschanged !== undefined) {
  speechSynthesis.onvoiceschanged = loadVoices;
}

// ===== APIキー =====
function loadKey() {
  try {
    if (localStorage.getItem('ai_radio_key')) {
      document.getElementById('keySavedBanner').style.display = 'flex';
      document.getElementById('keyInputArea').style.display = 'none';
    }
  } catch(e) {}
}
window.onload = loadKey;

function clearKey() {
  try { localStorage.removeItem('ai_radio_key'); } catch(e) {}
  document.getElementById('keySavedBanner').style.display = 'none';
  document.getElementById('keyInputArea').style.display = 'block';
  document.getElementById('apiKey').value = '';
}

function getApiKey() {
  try {
    const s = localStorage.getItem('ai_radio_key');
    if (s) return s;
  } catch(e) {}
  return document.getElementById('apiKey').value.trim();
}

function setStatus(msg, isError) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (isError ? ' error' : '');
}

// ===== BGM =====
function pickBgmPattern() {
  let idx;
  do { idx = Math.floor(Math.random() * BGM_PATTERNS.length); }
  while (idx === lastBgmIdx && BGM_PATTERNS.length > 1);
  lastBgmIdx = idx;
  return BGM_PATTERNS[idx];
}

function bgmTick(pattern) {
  if (!bgmOn || !audioCtx) return;
  const now = audioCtx.currentTime;
  const count = 8;
  for (let i = 0; i < count; i++) {
    try {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      const note = pattern.notes[Math.floor(Math.random() * pattern.notes.length)];
      osc.frequency.value = note * (Math.random() > 0.5 ? 1 : 0.5);
      osc.type = pattern.type;
      const s = now + i * pattern.interval;
      const d = pattern.interval * 1.6;
      gain.gain.setValueAtTime(0, s);
      gain.gain.linearRampToValueAtTime(pattern.vol, s + 0.3);
      gain.gain.linearRampToValueAtTime(0, s + d);
      osc.start(s);
      osc.stop(s + d);
      bgmNodes.push(osc);
    } catch(e) {}
  }
  const ms = count * pattern.interval * 1000;
  bgmLoopTimer = setTimeout(() => bgmTick(pattern), ms - 300);
}

function startBGM() {
  if (bgmOn) return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    bgmOn = true;
    document.getElementById('bgmDot').classList.remove('off');
    bgmTick(pickBgmPattern());
  } catch(e) { console.log('BGM err', e); }
}

function stopBGM() {
  bgmOn = false;
  if (bgmLoopTimer) { clearTimeout(bgmLoopTimer); bgmLoopTimer = null; }
  bgmNodes.forEach(n => { try { n.stop(); } catch(e){} });
  bgmNodes = [];
  document.getElementById('bgmDot').classList.add('off');
}

// ===== API呼び出し (ブラウザ直接通信用ヘッダーを追加して修正) =====
async function callAPI(prompt, maxTokens) {
  const apiKey = getApiKey();
  if (!apiKey) throw new Error('APIキーが入力されていません。');

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true' // 【重要】これがないとブラウザ直の通信がエラーになります
    },
    body: JSON.stringify({
      model: 'claude-3-5-sonnet-latest',
      max_tokens: maxTokens,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error(e.error?.message || `HTTPエラー: ${res.status}`);
  }
  const data = await res.json();
  return data.content[0].text.trim();
}

async function fetchScript(theme, djKeys) {
  const djA = DJS[djKeys[0]];
  const djB = DJS[djKeys[1]];

  const text = await callAPI(
    `あなたはラジオ番組の台本作家です。指定された2人のDJが会話するラジオ番組の台本を作ってください。

【登場人物】
DJ A：「${djA.name}」（性格・特徴：${djA.desc}）
DJ B：「${djB.name}」（性格・特徴：${djB.desc}）

【トークテーマ】
${theme}

【執筆ルール】
- 全部で30〜40回のやり取りを作ってください。
- 各セリフの先頭には、必ず半角大文字で「A:」または「B:」のみを付けてください。（例：「A:皆さんこんにちは！」「B:よろしくおねがいします」）
- キャラクター名（「ハル:」「${djA.name}:」など）は絶対に行頭に使わないでください。必ず「A:」「B:」に統一すること。
- お互いのことは実際の名前（${djA.name}、${djB.name}）で呼び合わさせてください。
- 挨拶から始まり、テーマを深掘りしながら自然に盛り上がり、最後に締める構成にしてください。

【出力形式】
A:セリフ
B:セリフ
A:セリフ

これ以外の余計な挨拶や解説文は一切出力しないでください。`,
    4096
  );

  const lines = [];
  text.split('\n').forEach(line => {
    const t = line.trim();
    if (t.startsWith('A:')) {
      lines.push({ dj: djKeys[0], text: t.replace(/^A:\s*/, '') });
    } else if (t.startsWith('B:')) {
      lines.push({ dj: djKeys[1], text: t.replace(/^B:\s*/, '') });
    }
  });

  // 万が一、AIが名前形式で出力してきた場合のフォールバック（保険）処理
  if (lines.length === 0) {
    text.split('\n').forEach(line => {
      const t = line.trim();
      if (t.startsWith(djA.name + ':') || t.startsWith(djA.name + '：')) {
        lines.push({ dj: djKeys[0], text: t.substring(djA.name.length + 1).trim() });
      } else if (t.startsWith(djB.name + ':') || t.startsWith(djB.name + '：')) {
        lines.push({ dj: djKeys[1], text: t.substring(djB.name.length + 1).trim() });
      }
    });
  }

  if (lines.length === 0) {
    throw new Error('台本の解析に失敗しました。もう一度お試しください。');
  }

  return { theme, lines, djKeys };
}

async function fetchCM() {
  const types = ['食品','アプリ','旅行','健康食品','家電','カフェ','スポーツジム','美容'];
  const type = types[Math.floor(Math.random() * types.length)];
  return await callAPI(
    `架空の${type}のラジオCMを日本語で作ってください。商品名は架空のもの。ナレーター1人が読む形式で約15秒分（60文字程度）。CMの文章のみ出力。`,
    200
  );
}

// ===== 読み上げ =====
function speak(text, djKey) {
  return new Promise(resolve => {
    synth.cancel();
    const dj = DJS[djKey] || { pitch: 1.0, rate: 1.0 };
    const u = new SpeechSynthesisUtterance(text);
    u.lang
