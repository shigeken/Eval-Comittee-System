<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI ラジオ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #2a2a3a;
    --accent: #ff4d6d;
    --accent2: #7b61ff;
    --text: #e8e8f0;
    --muted: #666680;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
  }

  .header {
    text-align: center;
    margin-bottom: 28px;
  }

  .station-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  h1 {
    font-size: clamp(32px, 8vw, 52px);
    font-weight: 900;
    letter-spacing: -1px;
  }

  h1 span { color: var(--accent); }

  .tagline {
    color: var(--muted);
    font-size: 13px;
    margin-top: 6px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px 20px;
    width: 100%;
    max-width: 480px;
    margin-bottom: 16px;
  }

  .section-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  input, textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 14px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  input:focus, textarea:focus { border-color: var(--accent2); }
  input[type="password"] { font-family: 'Share Tech Mono', monospace; letter-spacing: 2px; }

  textarea {
    resize: none;
    height: 72px;
    line-height: 1.6;
  }

  .form-group { margin-bottom: 18px; }

  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }

  .chip {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 12px;
    padding: 6px 14px;
    transition: all 0.2s;
  }

  .chip:hover, .chip.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(255,77,109,0.1);
  }

  /* APIキー保存済みバナー */
  .key-saved {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(123,97,255,0.1);
    border: 1px solid rgba(123,97,255,0.3);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--accent2);
  }

  .key-saved button {
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 12px;
    padding: 0;
    text-decoration: underline;
  }

  /* パーソナリティ */
  .dj-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 18px;
  }

  .dj-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 12px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
  }

  .dj-card.active-a { border-color: var(--accent); }
  .dj-card.active-b { border-color: var(--accent2); }

  .dj-emoji { font-size: 28px; margin-bottom: 6px; }

  .dj-name {
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .dj-desc {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.4;
  }

  .btn-generate {
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: 12px;
    color: white;
    cursor: pointer;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 16px;
    font-weight: 700;
    padding: 16px;
    letter-spacing: 1px;
    transition: all 0.2s;
  }

  .btn-generate:hover:not(:disabled) {
    background: #ff2d52;
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(255,77,109,0.4);
  }

  .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; }

  .status {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-top: 10px;
    min-height: 16px;
  }

  .status.error { color: var(--accent); }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 18px 0;
  }

  /* 出力エリア */
  .output-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px 20px;
    width: 100%;
    max-width: 480px;
    display: none;
    margin-bottom: 16px;
  }

  .output-card.visible { display: block; }

  /* 波形 */
  .waveform {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 32px;
    margin-bottom: 16px;
  }

  .bar {
    width: 3px;
    border-radius: 2px;
    background: var(--accent);
    animation: wave 1s ease-in-out infinite;
    opacity: 0.3;
  }

  .bar.playing { opacity: 1; }

  @keyframes wave {
    0%, 100% { height: 4px; }
    50% { height: 24px; }
  }

  .bar:nth-child(1){animation-delay:0s}
  .bar:nth-child(2){animation-delay:.1s}
  .bar:nth-child(3){animation-delay:.2s}
  .bar:nth-child(4){animation-delay:.3s}
  .bar:nth-child(5){animation-delay:.4s}
  .bar:nth-child(6){animation-delay:.3s}
  .bar:nth-child(7){animation-delay:.2s}
  .bar:nth-child(8){animation-delay:.1s}
  .bar:nth-child(9){animation-delay:0s}

  /* 会話ログ */
  .chat-log {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 20px;
    max-height: 400px;
    overflow-y: auto;
  }

  .chat-bubble {
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  .chat-bubble.right {
    flex-direction: row-reverse;
  }

  .bubble-avatar {
    font-size: 24px;
    flex-shrink: 0;
    width: 36px;
    text-align: center;
  }

  .bubble-content {
    max-width: 80%;
  }

  .bubble-name {
    font-size: 11px;
    font-weight: 700;
    margin-bottom: 4px;
    color: var(--muted);
  }

  .chat-bubble.right .bubble-name {
    text-align: right;
    color: var(--accent2);
  }

  .chat-bubble.left .bubble-name {
    color: var(--accent);
  }

  .bubble-text {
    background: var(--bg);
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.7;
    padding: 12px 14px;
    border: 1px solid var(--border);
  }

  .chat-bubble.left .bubble-text {
    border-color: rgba(255,77,109,0.3);
    border-top-left-radius: 4px;
  }

  .chat-bubble.right .bubble-text {
    border-color: rgba(123,97,255,0.3);
    border-top-right-radius: 4px;
  }

  /* 現在話している行をハイライト */
  .bubble-text.speaking {
    background: rgba(255,255,255,0.05);
  }

  .controls {
    display: flex;
    gap: 10px;
  }

  .btn-play {
    flex: 1;
    background: var(--accent2);
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 14px;
    font-weight: 700;
    padding: 12px;
    transition: all 0.2s;
  }

  .btn-play:hover { opacity: 0.85; }

  .btn-stop {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 14px;
    padding: 12px 16px;
    transition: all 0.2s;
  }

  .btn-stop:hover { border-color: var(--accent); color: var(--accent); }

  .loading-text::after {
    content: '';
    animation: dots 1.2s steps(4, end) infinite;
  }

  @keyframes dots {
    0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}
  }
</style>
</head>
<body>

<div class="header">
  <div class="station-label">📻 on air</div>
  <h1>AI<span>Radio</span></h1>
  <div class="tagline">2人のDJがトークを繰り広げる</div>
</div>

<!-- 入力カード -->
<div class="card">
  <div id="apiKeyGroup">
    <div class="section-label">🔑 API キー</div>
    <div id="keySavedBanner" class="key-saved" style="display:none">
      <span>✅ APIキー保存済み</span>
      <button onclick="clearKey()">削除して再入力</button>
    </div>
    <div id="keyInputArea">
      <input type="password" id="apiKey" placeholder="sk-ant-api..." autocomplete="off">
      <div style="margin-top:8px;display:flex;gap:8px;align-items:center;">
        <input type="checkbox" id="saveKey" checked style="width:auto;padding:0;accent-color:var(--accent2)">
        <label for="saveKey" style="font-size:12px;color:var(--muted);cursor:pointer">このデバイスに保存する</label>
      </div>
    </div>
  </div>

  <hr class="divider">

  <div class="section-label">🎙️ DJを選ぶ</div>
  <div class="dj-cards">
    <div class="dj-card active-a" id="dj-a-card">
      <div class="dj-emoji">😄</div>
      <div class="dj-name" id="dj-a-name">ハル</div>
      <div class="dj-desc" id="dj-a-desc">明るくテンション高め。話を広げるのが得意</div>
    </div>
    <div class="dj-card active-b" id="dj-b-card">
      <div class="dj-emoji">🤓</div>
      <div class="dj-name" id="dj-b-name">ソラ</div>
      <div class="dj-desc" id="dj-b-desc">冷静で知識豊富。ツッコミ担当</div>
    </div>
  </div>

  <div class="form-group">
    <div class="section-label">📡 テーマ</div>
    <textarea id="theme" placeholder="例：最近のAIブーム、週末の過ごし方..."></textarea>
    <div class="chips">
      <button class="chip" onclick="setTheme('最近のAIブームについて')">🤖 AI</button>
      <button class="chip" onclick="setTheme('週末のおすすめの過ごし方')">🎉 週末</button>
      <button class="chip" onclick="setTheme('今日の豆知識')">💡 豆知識</button>
      <button class="chip" onclick="setTheme('朝のモーニングトーク')">☀️ 朝トーク</button>
      <button class="chip" onclick="setTheme('最近ハマっていること')">❤️ マイブーム</button>
    </div>
  </div>

  <button class="btn-generate" id="generateBtn" onclick="generate()">
    🎙️ 放送開始
  </button>
  <div class="status" id="status"></div>
</div>

<!-- 出力カード -->
<div class="output-card" id="outputCard">
  <div class="section-label">📡 オンエア中</div>
  <div class="waveform" id="waveform">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
  </div>
  <div class="chat-log" id="chatLog"></div>
  <div class="controls">
    <button class="btn-play" id="playBtn" onclick="togglePlay()">▶ 読み上げる</button>
    <button class="btn-stop" onclick="stopAll()">■ 停止</button>
  </div>
</div>

<script>
const DJS = {
  a: { name: 'ハル', emoji: '😄', pitch: 1.2, rate: 1.05 },
  b: { name: 'ソラ', emoji: '🤓', pitch: 0.85, rate: 0.95 }
};

let lines = []; // [{dj:'a', text:'...'}, ...]
let synth = window.speechSynthesis;
let isPlaying = false;
let currentIdx = 0;
let voices = [];

// 音声リスト取得
function loadVoices() {
  voices = synth.getVoices().filter(v => v.lang.startsWith('ja'));
}
loadVoices();
if (speechSynthesis.onvoiceschanged !== undefined) {
  speechSynthesis.onvoiceschanged = loadVoices;
}

// APIキー保存
function loadKey() {
  try {
    const saved = localStorage.getItem('ai_radio_key');
    if (saved) {
      document.getElementById('keySavedBanner').style.display = 'flex';
      document.getElementById('keyInputArea').style.display = 'none';
    }
  } catch(e) {}
}

function clearKey() {
  try { localStorage.removeItem('ai_radio_key'); } catch(e) {}
  document.getElementById('keySavedBanner').style.display = 'none';
  document.getElementById('keyInputArea').style.display = 'block';
  document.getElementById('apiKey').value = '';
}

function getApiKey() {
  try {
    const saved = localStorage.getItem('ai_radio_key');
    if (saved) return saved;
  } catch(e) {}
  return document.getElementById('apiKey').value.trim();
}

function setTheme(text) {
  document.getElementById('theme').value = text;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
}

function setStatus(msg, isError) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (isError ? ' error' : '');
}

async function generate() {
  const apiKey = getApiKey();
  const theme = document.getElementById('theme').value.trim();

  if (!apiKey) { setStatus('APIキーを入力してください', true); return; }

  // 保存チェック
  try {
    const shouldSave = document.getElementById('saveKey');
    if (shouldSave && shouldSave.checked) {
      localStorage.setItem('ai_radio_key', apiKey);
      document.getElementById('keySavedBanner').style.display = 'flex';
      document.getElementById('keyInputArea').style.display = 'none';
    }
  } catch(e) {}
  if (!theme) { setStatus('テーマを入力してください', true); return; }

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-text">台本を生成中</span>';
  setStatus('AIが2人分の台本を書いています...', false);
  stopAll();

  const prompt = `あなたはラジオ番組の台本作家です。
2人のDJが会話するラジオ番組の台本を作ってください。

DJ A「${DJS.a.name}」: 明るくテンション高め。話を広げるのが得意。
DJ B「${DJS.b.name}」: 冷静で知識豊富。ツッコミ担当。

テーマ：${theme}

【ルール】
- 全部で8〜12回のやり取りをする
- 自然な会話のテンポで
- 各セリフは1〜3文程度
- 挨拶から始まり、テーマについて盛り上がって、締めの言葉で終わる

【出力形式】必ずこの形式のみで出力してください：
A:セリフ
B:セリフ
A:セリフ
B:セリフ
...

余計な説明や記号は不要です。`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1500,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || 'APIエラー');
    }

    const data = await response.json();
    const raw = data.content[0].text;

    // パース
    lines = [];
    raw.split('\n').forEach(line => {
      const trimmed = line.trim();
      if (trimmed.startsWith('A:')) {
        lines.push({ dj: 'a', text: trimmed.slice(2).trim() });
      } else if (trimmed.startsWith('B:')) {
        lines.push({ dj: 'b', text: trimmed.slice(2).trim() });
      }
    });

    if (lines.length === 0) throw new Error('台本の生成に失敗しました');

    renderChat();
    document.getElementById('outputCard').classList.add('visible');
    setStatus('台本完成！▶で読み上げられます', false);

  } catch(e) {
    setStatus('エラー: ' + e.message, true);
  } finally {
    btn.disabled = false;
    btn.textContent = '🎙️ 放送開始';
  }
}

function renderChat() {
  const log = document.getElementById('chatLog');
  log.innerHTML = '';
  lines.forEach((line, i) => {
    const dj = DJS[line.dj];
    const side = line.dj === 'a' ? 'left' : 'right';
    const div = document.createElement('div');
    div.className = `chat-bubble ${side}`;
    div.id = `bubble-${i}`;
    div.innerHTML = `
      <div class="bubble-avatar">${dj.emoji}</div>
      <div class="bubble-content">
        <div class="bubble-name">${dj.name}</div>
        <div class="bubble-text" id="text-${i}">${line.text}</div>
      </div>`;
    log.appendChild(div);
  });
}

function togglePlay() {
  if (isPlaying) {
    synth.cancel();
    setPlaying(false);
  } else {
    speakFrom(0);
  }
}

function speakFrom(startIdx) {
  currentIdx = startIdx;
  setPlaying(true);
  speakNext();
}

function speakNext() {
  if (currentIdx >= lines.length) {
    setPlaying(false);
    return;
  }

  // ハイライト
  document.querySelectorAll('.bubble-text').forEach(el => el.classList.remove('speaking'));
  const currentEl = document.getElementById(`text-${currentIdx}`);
  if (currentEl) {
    currentEl.classList.add('speaking');
    currentEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  const line = lines[currentIdx];
  const dj = DJS[line.dj];
  const utter = new SpeechSynthesisUtterance(line.text);
  utter.lang = 'ja-JP';
  utter.pitch = dj.pitch;
  utter.rate = dj.rate;
  if (voices.length > 0) utter.voice = voices[currentIdx % voices.length] || voices[0];

  utter.onend = () => {
    currentIdx++;
    setTimeout(speakNext, 300);
  };
  utter.onerror = () => {
    currentIdx++;
    speakNext();
  };

  synth.speak(utter);
}

function stopAll() {
  synth.cancel();
  setPlaying(false);
  document.querySelectorAll('.bubble-text').forEach(el => el.classList.remove('speaking'));
}

function setPlaying(playing) {
  isPlaying = playing;
  const btn = document.getElementById('playBtn');
  const bars = document.querySelectorAll('.bar');
  if (playing) {
    btn.textContent = '⏹ 停止';
    bars.forEach(b => b.classList.add('playing'));
  } else {
    btn.textContent = '▶ 読み上げる';
    bars.forEach(b => b.classList.remove('playing'));
  }
}
loadKey();
</script>
</body>
</html>
