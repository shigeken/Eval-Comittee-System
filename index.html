<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アイデア評価委員会</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #EDEEF1; font-family: system-ui, -apple-system, sans-serif; color: #1A1A2E; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const PROMPT = `あなたは3名の評価委員です。入力されたアイデアに対して、それぞれの立場から意見を述べてください。
JSONのみを返答してください。マークダウン・バッククォート不要。

委員A：論理的思考。アイデアの正当性を評価する。論理的に成立しているか、根拠はあるか、反証可能かを検討する。
委員B：創造的思考。アイデアをどう発展させられるかを考える。関連する概念との接続や拡張の可能性を提案する。
委員C：実践的思考。アイデアをどう実装・利用できるかを考える。具体的なプロダクトや応用方法を提案する。

形式：
{"A":{"comment":"200字"},"B":{"comment":"200字"},"C":{"comment":"200字"},"summary":"三者の評価を統合した総合報告書300字"}`;

    const MEMBERS = [
      { key: "A", mono: "A", title: "論理的思考", sub: "正当性の評価", accent: "#1B4F72", light: "#EAF2FB" },
      { key: "B", mono: "B", title: "創造的思考", sub: "発展可能性の探索", accent: "#6C3483", light: "#F4ECF7" },
      { key: "C", mono: "C", title: "実践的思考", sub: "実装・活用の提案", accent: "#1A6B3C", light: "#E9F7EF" },
    ];

    function App() {
      const [apiKey, setApiKey] = useState("");
      const [idea, setIdea] = useState("");
      const [phase, setPhase] = useState("input");
      const [result, setResult] = useState(null);
      const [error, setError] = useState("");

      const handleEval = async () => {
        if (!apiKey || !idea.trim()) { setError("APIキーとアイデアを入力してください。"); return; }
        setError(""); setPhase("loading");
        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-api-key": apiKey,
              "anthropic-version": "2023-06-01",
              "anthropic-dangerous-direct-browser-access": "true",
            },
            body: JSON.stringify({
              model: "claude-sonnet-4-6",
              max_tokens: 1500,
              system: PROMPT,
              messages: [{ role: "user", content: `アイデア：\n${idea}` }],
            }),
          });
          const data = await res.json();
          if (data.error) throw new Error(data.error.message);
          const raw = data.content.map(b => b.text || "").join("");
          setResult(JSON.parse(raw.replace(/```json|```/g, "").trim()));
          setPhase("result");
        } catch (e) {
          setError("エラー: " + e.message);
          setPhase("input");
        }
      };

      const reset = () => { setPhase("input"); setResult(null); setIdea(""); setError(""); };

      return (
        <div style={{ minHeight: "100vh", background: "#EDEEF1" }}>

          {/* Header */}
          <header style={{ background: "#1A1A2E" }}>
            <div style={{ maxWidth: 720, margin: "0 auto", padding: "20px 24px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div>
                <div style={{ fontFamily: "'Courier New', monospace", fontSize: 10, color: "#E8C547", letterSpacing: 4, marginBottom: 4 }}>EVAL COMMITTEE SYSTEM v1.0</div>
                <div style={{ fontSize: 20, fontWeight: 700, color: "#fff", letterSpacing: 1 }}>アイデア評価委員会</div>
              </div>
              <div style={{ width: 44, height: 44, border: "2px solid #E8C547", borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center" }}>
                <div style={{ fontFamily: "'Courier New', monospace", fontSize: 18, color: "#E8C547", fontWeight: 700 }}>◆</div>
              </div>
            </div>
          </header>

          <div style={{ maxWidth: 720, margin: "0 auto", padding: "36px 24px" }}>

            {/* INPUT */}
            {phase === "input" && (
              <div>
                <div style={{ background: "#fff", border: "1px solid #D8D9DC", padding: "32px", marginBottom: 0 }}>
                  <div style={{ fontFamily: "'Courier New', monospace", fontSize: 10, color: "#888", letterSpacing: 3, marginBottom: 20 }}>SUBMISSION FORM — 審議申請書</div>

                  {error && (
                    <div style={{ background: "#FEF0F0", border: "1px solid #E74C3C", color: "#C0392B", padding: "10px 14px", marginBottom: 20, fontSize: 13 }}>
                      {error}
                    </div>
                  )}

                  <div style={{ marginBottom: 20 }}>
                    <div style={{ fontSize: 11, color: "#888", letterSpacing: 1, marginBottom: 6 }}>ANTHROPIC API KEY</div>
                    <input
                      type="password"
                      value={apiKey}
                      onChange={e => setApiKey(e.target.value)}
                      placeholder="sk-ant-..."
                      style={{ width: "100%", padding: "10px 12px", border: "1px solid #D0D1D5", fontSize: 13, background: "#FAFAFA", outline: "none" }}
                    />
                    <div style={{ fontSize: 10, color: "#aaa", marginTop: 4 }}>APIキーはブラウザ内でのみ使用されます</div>
                  </div>

                  <div style={{ marginBottom: 28 }}>
                    <div style={{ fontSize: 11, color: "#888", letterSpacing: 1, marginBottom: 6 }}>IDEA — 評価対象アイデア</div>
                    <textarea
                      value={idea}
                      onChange={e => setIdea(e.target.value)}
                      placeholder={"思いついたことをそのまま書いてください。\n走り書き・箇条書き・未完成でも構いません。"}
                      rows={8}
                      style={{ width: "100%", padding: "12px", border: "1px solid #D0D1D5", fontSize: 14, background: "#FAFAFA", resize: "vertical", lineHeight: 1.75, outline: "none" }}
                    />
                  </div>

                  <div style={{ display: "flex", justifyContent: "flex-end" }}>
                    <button
                      onClick={handleEval}
                      style={{ background: "#1A1A2E", color: "#fff", border: "none", padding: "12px 32px", fontSize: 12, letterSpacing: 2, cursor: "pointer", fontFamily: "'Courier New', monospace" }}
                    >
                      評価を依頼する →
                    </button>
                  </div>
                </div>

                {/* Member intro */}
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 1, marginTop: 1 }}>
                  {MEMBERS.map(m => (
                    <div key={m.key} style={{ background: "#fff", padding: "16px", borderTop: `3px solid ${m.accent}` }}>
                      <div style={{ fontSize: 22, fontWeight: 800, color: m.accent, fontFamily: "'Courier New', monospace", lineHeight: 1 }}>{m.mono}</div>
                      <div style={{ fontSize: 13, fontWeight: 600, marginTop: 6, color: "#1A1A2E" }}>{m.title}</div>
                      <div style={{ fontSize: 11, color: "#888", marginTop: 2 }}>{m.sub}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* LOADING */}
            {phase === "loading" && (
              <div style={{ background: "#fff", border: "1px solid #D8D9DC", padding: "60px 32px", textAlign: "center" }}>
                <div style={{ fontFamily: "'Courier New', monospace", fontSize: 11, color: "#E8C547", letterSpacing: 3, marginBottom: 16 }}>IN REVIEW</div>
                <div style={{ fontSize: 16, color: "#1A1A2E", fontWeight: 600, marginBottom: 8 }}>評価委員会が審議中です</div>
                <div style={{ fontSize: 13, color: "#888", lineHeight: 1.7 }}>
                  3名の委員がそれぞれの立場から評価しています。<br />しばらくお待ちください。
                </div>
                <div style={{ display: "flex", justifyContent: "center", gap: 20, marginTop: 32 }}>
                  {MEMBERS.map(m => (
                    <div key={m.key} style={{ width: 40, height: 40, border: `2px solid ${m.accent}`, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center" }}>
                      <div style={{ fontSize: 16, fontWeight: 800, color: m.accent, fontFamily: "'Courier New', monospace" }}>{m.mono}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* RESULT */}
            {phase === "result" && result && (
              <div>
                <div style={{ background: "#1A1A2E", padding: "20px 28px", marginBottom: 2 }}>
                  <div style={{ fontFamily: "'Courier New', monospace", fontSize: 10, color: "#E8C547", letterSpacing: 3, marginBottom: 8 }}>SUBMITTED IDEA — 評価対象</div>
                  <div style={{ fontSize: 14, color: "#ccc", lineHeight: 1.7, maxHeight: 80, overflow: "hidden" }}>
                    {idea.slice(0, 120)}{idea.length > 120 ? "..." : ""}
                  </div>
                </div>

                {MEMBERS.map(m => {
                  const r = result[m.key];
                  if (!r) return null;
                  return (
                    <div key={m.key} style={{ background: "#fff", borderLeft: `4px solid ${m.accent}`, padding: "24px 28px", marginBottom: 2 }}>
                      <div style={{ display: "flex", alignItems: "flex-start", gap: 20 }}>
                        <div style={{ flexShrink: 0, width: 52, height: 52, background: m.light, display: "flex", alignItems: "center", justifyContent: "center" }}>
                          <div style={{ fontSize: 28, fontWeight: 800, color: m.accent, fontFamily: "'Courier New', monospace", lineHeight: 1 }}>{m.mono}</div>
                        </div>
                        <div style={{ flex: 1 }}>
                          <div style={{ display: "flex", alignItems: "baseline", gap: 10, marginBottom: 10 }}>
                            <div style={{ fontSize: 15, fontWeight: 700, color: m.accent }}>委員{m.key}</div>
                            <div style={{ fontSize: 11, color: "#888" }}>{m.title} — {m.sub}</div>
                          </div>
                          <div style={{ fontSize: 14, lineHeight: 1.9, color: "#2C2C3E" }}>{r.comment}</div>
                        </div>
                      </div>
                    </div>
                  );
                })}

                {result.summary && (
                  <div style={{ background: "#1A1A2E", padding: "28px 32px", marginTop: 2 }}>
                    <div style={{ fontFamily: "'Courier New', monospace", fontSize: 10, color: "#E8C547", letterSpacing: 3, marginBottom: 14 }}>SUMMARY REPORT — 総合報告書</div>
                    <div style={{ fontSize: 14, color: "#E0E0E8", lineHeight: 1.9 }}>{result.summary}</div>
                  </div>
                )}

                <div style={{ marginTop: 24, textAlign: "center" }}>
                  <button onClick={reset} style={{ background: "transparent", border: "1px solid #1A1A2E", color: "#1A1A2E", padding: "10px 28px", fontSize: 12, letterSpacing: 2, cursor: "pointer", fontFamily: "'Courier New', monospace" }}>
                    新しいアイデアを評価する
                  </button>
                </div>
              </div>
            )}
          </div>

          <footer style={{ borderTop: "1px solid #D0D1D5", padding: "16px 24px", marginTop: 40, textAlign: "center" }}>
            <div style={{ fontFamily: "'Courier New', monospace", fontSize: 10, color: "#aaa", letterSpacing: 2 }}>EVAL COMMITTEE SYSTEM — POWERED BY CLAUDE</div>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
