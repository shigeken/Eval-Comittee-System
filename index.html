<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Radio</title>
</head>

<body>
<button onclick="startRadio()">▶ 放送開始</button>
<div id="log"></div>

<script>
// =========================
// 状態
// =========================
let isRunning = false;

// =========================
// 🔌 API呼び出し（Cloudflare Workers経由）
// =========================
async function callAPI(prompt, max_tokens) {
  const res = await fetch("https://YOUR_WORKER_URL.workers.dev", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      prompt,
      max_tokens
    })
  });

  const data = await res.json();

  if (!res.ok) {
    throw new Error(data.error || "API error");
  }

  return data.text;
}

// =========================
// 🎯 テーマ生成
// =========================
async function fetchTheme() {
  return await callAPI(
    "ラジオ番組の面白いテーマを1つだけ短く出して",
    100
  );
}

// =========================
// 🎭 台本生成
// =========================
async function fetchScript(theme) {
  const text = await callAPI(
    `2人のDJのラジオ会話を作ってください。

テーマ：${theme}

ルール：
- A: と B: で会話
- 30往復くらい
- ラジオっぽく楽しく`,
    2000
  );

  return text
    .split("\n")
    .filter(line => line.includes(":"))
    .map(line => {
      const [speaker, ...rest] = line.split(":");
      return {
        speaker: speaker.trim(),
        text: rest.join(":").trim()
      };
    });
}

// =========================
// 🔊 音声再生
// =========================
function speak(text) {
  return new Promise(resolve => {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "ja-JP";
    u.onend = resolve;
    u.onerror = resolve;
    speechSynthesis.speak(u);
  });
}

// =========================
// 📺 ログ表示
// =========================
function log(t) {
  document.getElementById("log").innerHTML += `<div>${t}</div>`;
}

// =========================
// 🔁 メインループ
// =========================
async function loop() {
  while (isRunning) {
    try {
      const theme = await fetchTheme();
      log("🎯 テーマ: " + theme);

      const script = await fetchScript(theme);

      for (const line of script) {
        if (!isRunning) return;

        log(`${line.speaker}: ${line.text}`);

        await speak(line.text);
      }

    } catch (e) {
      log("❌ エラー: " + e.message);
      break;
    }
  }
}

// =========================
// ▶ 開始
// =========================
async function startRadio() {
  isRunning = true;
  loop();
}
</script>

</body>
</html>
